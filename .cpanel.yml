---
deployment:
  tasks:
    # Set deployment path
    - export APPPATH=../../laravel_app
    - export PUBLICPATH=../../public_html

    # === Create backend folder if not exists ===
    - /bin/mkdir -p $APPPATH
    - /bin/rm -rf $APPPATH/database/migrations/* || true

    # === Copy backend folders ===
    - /bin/cp -R app $APPPATH
    - /bin/cp -R bootstrap $APPPATH
    - /bin/cp -R config $APPPATH
    - /bin/cp -R database $APPPATH
    - /bin/cp -R resources $APPPATH
    - /bin/cp -R routes $APPPATH
    - /bin/cp -R storage $APPPATH

    # === Copy core files ===
    - /bin/cp artisan $APPPATH
    - /bin/cp composer.json $APPPATH
    - /bin/cp composer.lock $APPPATH || true
    - /bin/cp .env.example $APPPATH || true

    # === Delete index.html if exists ===
    - /bin/rm -f $PUBLICPATH/index.html

    # === Copy public folder contents to public_html ===
    - /bin/cp -R public/* $PUBLICPATH
    - /bin/cp -R public/.htaccess $PUBLICPATH || true

    # === Unzip the build.zip file to the public directory ===
    - /bin/rm -rf $APPPATH/public/build/* || true
    - /bin/unzip -o public/build.zip -d $APPPATH/public || true
    - /bin/unzip -o public/build.zip -d $PUBLICPATH || true

    # === Fix index.php paths ===
    - /bin/sed -i "s|../vendor/autoload.php|../laravel_app/vendor/autoload.php|g" $PUBLICPATH/index.php
    - /bin/sed -i "s|../bootstrap/app.php|../laravel_app/bootstrap/app.php|g" $PUBLICPATH/index.php
